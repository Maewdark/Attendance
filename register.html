<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 20px; background: #f8f9fa; }
    video { border-radius: 8px; width: 100%; max-width: 500px; background: #000; transform: scaleX(-1); }
    .container { max-width: 600px; margin: 0 auto; }
    input { padding: 12px; width: 70%; font-size: 16px; margin-top: 15px; border: 1px solid #ddd; border-radius: 5px; }
    button { padding: 12px 25px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    button:disabled { background: #ccc; }
    #msg { margin-top: 15px; font-weight: bold; color: #28a745; min-height: 24px; }
    .instruction { font-size: 14px; color: #666; margin-bottom: 10px; }
    .count-badge { background: #6c757d; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-left: 5px;}
  </style>
</head>
<body>
  <div class="container">
    <h2>👤 ลงทะเบียนใบหน้า</h2>
    <p class="instruction">💡 เพื่อความแม่นยำ ควรบันทึก 3 มุม (หน้าตรง / หันซ้ายนิดหน่อย / หันขวานิดหน่อย)</p>
    
    <div id="status">กำลังโหลด Model...</div>
    <video id="video" autoplay muted playsinline></video>
    
    <input type="text" id="username" placeholder="ระบุชื่อพนักงาน ชื่อจริง ชื่อเล่น (เช่น สมชาย เกม)">
    <br>
    <button id="btnSave" onclick="saveFace()" disabled>
      📸 บันทึกใบหน้า <span id="saveCount" class="count-badge">0</span>
    </button>
    
    <div id="msg"></div>
    
    <!-- เปลี่ยนลิงก์กลับเมนูเป็น Apps Script URL -->
    <a href="https://script.google.com/macros/s/AKfycbylcH8eA8F9r2X1hUz0ag1QylFHmYMFcLC6DDIDk4o4m3qcS1SnEw9OBV2JTWMsuNmJ/exec" 
       style="display:block; margin-top:20px; color:#666;">← กลับเมนู</a>
  </div>

  <script>
    // ---- เพิ่ม URL ของ Apps Script ----
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylcH8eA8F9r2X1hUz0ag1QylFHmYMFcLC6DDIDk4o4m3qcS1SnEw9OBV2JTWMsuNmJ/exec";

    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btnSave = document.getElementById('btnSave');
    const msgDiv = document.getElementById('msg');
    const saveCountSpan = document.getElementById('saveCount');
    let saveCounter = 0;

    window.addEventListener('load', async () => {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('./models'),
        faceapi.nets.faceLandmark68Net.loadFromUri('./models'),
        faceapi.nets.faceRecognitionNet.loadFromUri('./models')
      ]);
      startVideo();
    });

    function startVideo() {
      navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => {
          video.srcObject = stream;
          status.innerText = "";
          btnSave.disabled = false;
        });
    }

    async function saveFace() {
      const name = document.getElementById('username').value.trim();
      if (!name) return alert("กรุณาใส่ชื่อก่อน");

      btnSave.disabled = true;
      btnSave.innerText = "กำลังประมวลผล...";
      msgDiv.innerText = "";

      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

      if (detection) {
        const descriptor = Array.from(detection.descriptor);

        // ---- เปลี่ยนจาก google.script.run เป็น fetch ----
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: "register", name, descriptor })
        });

        saveCounter++;
        saveCountSpan.innerText = saveCounter;
        msgDiv.innerText = `✅ บันทึกครั้งที่ ${saveCounter} สำเร็จ! ลองขยับหน้าเล็กน้อยแล้วกดบันทึกอีกครั้ง`;
        btnSave.disabled = false;
        btnSave.innerText = `📸 บันทึกใบหน้าเพิ่ม`;

      } else {
        alert("ไม่พบใบหน้า! กรุณามองกล้องให้ชัดเจน");
        btnSave.disabled = false;
        btnSave.innerText = "📸 บันทึกใบหน้า";
      }
    }
  </script>
</body>
</html>
